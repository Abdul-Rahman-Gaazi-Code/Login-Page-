<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOGIN PAGE</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section>
      <!--  Backgrounds -->
      <div class="background">
        <span class="background1"></span>
        <span class="background2"></span>
        <span class="background3"></span>
        <span class="background4"></span>

        <!-- Login Form -->
        <form id="login-form" action="#" method="post">
          <!-- Username Input Group -->
          <div id="input-group">
            <img src="svg icons/user-svgrepo-com.svg" alt="username-icon" />
            <div id="input-field">
              <input
                type="text"
                name="username"
                id="username"
                placeholder="User name/Email"
              />
            </div>
          </div>
          <!-- Password Input Group -->
          <div id="input-group">
            <img src="svg icons/lock-svgrepo-com.svg" alt="password-icon" />
            <div id="input-field">
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Password"
                required
              />
            </div>
          </div>
          <!-- Login Button -->
          <button type="submit" id="login-btn">
            LOGIN NOW
            <img
              src="svg icons/right-arrow-backup-2-svgrepo-com.svg"
              alt="right arrow"
              class="btn-arrow"
            />
          </button>
        </form>

        <!-- Social Login Section -->
        <div id="social-login">
          <p>log in via</p>
          <div id="social-icons">
            <img src="svg icons/instagram-svgrepo-com.svg" alt="instagram" />
            <img src="svg icons/facebook-svgrepo-com.svg" alt="facebook" />
            <img src="svg icons/twitter-154-svgrepo-com.svg" alt="twitter" />
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
